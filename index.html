<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Clock (large, prominent) -->
    <div class="widget clock-widget">
      <div class="flip-clock" id="flip-clock">
        <div class="flip-digit" id="h0"><div class="flip-card"><span>0</span></div></div>
        <div class="flip-digit" id="h1"><div class="flip-card"><span>0</span></div></div>
        <div class="flip-colon">:</div>
        <div class="flip-digit" id="m0"><div class="flip-card"><span>0</span></div></div>
        <div class="flip-digit" id="m1"><div class="flip-card"><span>0</span></div></div>
      </div>
      <div class="clock-date" id="clock-date"></div>
    </div>

    <!-- Weather (large) -->
    <div class="widget weather-widget">
      <div class="widget-header">
        <span class="widget-label">WEATHER</span>
        <span class="widget-rule"></span>
      </div>
      <div class="weather-layout">
        <div class="weather-current" id="weather-current">
          <div class="weather-temp" id="current-temp">--</div>
          <div class="weather-details">
            <span class="weather-condition" id="current-condition">--</span>
            <span id="current-humidity"></span>
            <span id="current-wind"></span>
          </div>
        </div>
        <div class="weather-divider"></div>
        <div class="weather-forecast" id="weather-forecast"></div>
      </div>
    </div>

    <!-- Lecture Countdown (important) -->
    <div class="widget class-widget">
      <div class="widget-header">
        <span class="widget-label">LECTURE</span>
        <span class="widget-rule"></span>
      </div>
      <div class="class-countdown" id="class-countdown">
        <div class="class-name" id="class-name">--</div>
        <div class="class-time-remaining" id="class-time-remaining"></div>
        <div class="class-schedule-info" id="class-schedule-info"></div>
      </div>
      <div class="section-rule"></div>
      <div class="class-today-list" id="class-today-list"></div>
    </div>

    <!-- Calendar (important) -->
    <div class="widget calendar-widget">
      <div class="widget-header">
        <span class="widget-label">TODAY</span>
        <span class="widget-rule"></span>
      </div>
      <ul class="calendar-events-list" id="today-events"></ul>
    </div>

    <!-- Stocks (compact) -->
    <div class="widget stocks-widget">
      <div class="widget-header">
        <span class="widget-label">MARKETS</span>
        <span class="widget-rule"></span>
      </div>
      <div class="stocks-list" id="stocks-list">
        <div class="stock-row">
          <span class="stock-label">KOSPI</span>
          <span class="stock-value" id="kospi-value">--</span>
          <span class="stock-change" id="kospi-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">KOSDAQ</span>
          <span class="stock-value" id="kosdaq-value">--</span>
          <span class="stock-change" id="kosdaq-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">NASDAQ</span>
          <span class="stock-value" id="nasdaq-value">--</span>
          <span class="stock-change" id="nasdaq-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">USD/KRW</span>
          <span class="stock-value" id="usd-krw">--</span>
          <span class="stock-change" id="usd-krw-change"></span>
        </div>
      </div>
      <div class="widget-footer" id="stocks-updated"></div>
    </div>

    <!-- Air Quality (compact) -->
    <div class="widget air-widget">
      <div class="widget-header">
        <span class="widget-label">INDOOR AIR</span>
        <span class="widget-rule"></span>
      </div>
      <div class="air-status-row">
        <div class="air-dot" id="air-dot"></div>
        <span class="air-status-text" id="air-status-text">좋음</span>
        <span class="air-status-aqi" id="air-aqi"></span>
      </div>
      <div class="air-grid">
        <div class="air-cell">
          <span class="air-cell-label">PM2.5</span>
          <span class="air-cell-val"><span id="air-pm25">--</span> <span class="air-cell-unit">µg/m³</span></span>
          <span class="air-cell-sub" id="air-pm25-status">--</span>
        </div>
        <div class="air-cell">
          <span class="air-cell-label">PM10</span>
          <span class="air-cell-val"><span id="air-pm10">--</span> <span class="air-cell-unit">µg/m³</span></span>
          <span class="air-cell-sub" id="air-pm10-status">--</span>
        </div>
        <div class="air-cell">
          <span class="air-cell-label">온도</span>
          <span class="air-cell-val"><span id="air-temp">--</span>°C</span>
        </div>
        <div class="air-cell">
          <span class="air-cell-label">습도</span>
          <span class="air-cell-val"><span id="air-humidity">--</span>%</span>
        </div>
      </div>
      <div class="air-footer" id="air-updated">연구실 · --:-- 업데이트</div>
    </div>

    <!-- Media -->
    <div class="widget youtube-widget">
      <div class="widget-header">
        <span class="widget-label">MEDIA</span>
        <span class="widget-rule"></span>
      </div>
      <div class="yt-thumb-grid" id="yt-thumb-grid"></div>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
