<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">

    <!-- Clock -->
    <div class="widget clock-widget">
      <div class="clock-time">
        <span class="clock-digits" id="clock-digits">00:00</span>
      </div>
      <div class="clock-date" id="clock-date"></div>
    </div>

    <!-- Weather -->
    <div class="widget weather-widget">
      <div class="widget-header">
        <span class="widget-label">WEATHER</span>
        <span class="widget-rule"></span>
      </div>
      <div class="weather-current" id="weather-current">
        <div class="weather-temp" id="current-temp">--</div>
        <div class="weather-details">
          <span class="weather-condition" id="current-condition">--</span>
          <span id="current-humidity"></span>
          <span id="current-wind"></span>
        </div>
      </div>
      <div class="section-rule"></div>
      <div class="weather-forecast" id="weather-forecast"></div>
    </div>

    <!-- Stocks -->
    <div class="widget stocks-widget">
      <div class="widget-header">
        <span class="widget-label">MARKETS</span>
        <span class="widget-rule"></span>
      </div>
      <div class="stocks-list" id="stocks-list">
        <div class="stock-row">
          <span class="stock-label">KOSPI</span>
          <span class="stock-value" id="kospi-value">--</span>
          <span class="stock-change" id="kospi-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">KOSDAQ</span>
          <span class="stock-value" id="kosdaq-value">--</span>
          <span class="stock-change" id="kosdaq-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">NASDAQ</span>
          <span class="stock-value" id="nasdaq-value">--</span>
          <span class="stock-change" id="nasdaq-change"></span>
        </div>
        <div class="stock-row">
          <span class="stock-label">USD/KRW</span>
          <span class="stock-value" id="usd-krw">--</span>
          <span class="stock-change" id="usd-krw-change"></span>
        </div>
      </div>
      <div class="widget-footer" id="stocks-updated"></div>
    </div>

    <!-- Chat -->
    <div class="widget chat-widget">
      <div class="widget-header">
        <span class="widget-label">ASSISTANT</span>
        <span class="widget-rule"></span>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-message bot-message">
          <span class="message-text">무엇을 도와드릴까요?</span>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="메시지 입력" autocomplete="off">
        <button id="chat-send" aria-label="Send">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Calendar -->
    <div class="widget calendar-widget">
      <div class="widget-header">
        <span class="widget-label">SCHEDULE</span>
        <span class="widget-rule"></span>
      </div>
      <div class="calendar-body">
        <div class="calendar-section">
          <div class="calendar-day-header">TODAY</div>
          <ul class="calendar-events" id="today-events"></ul>
        </div>
        <div class="calendar-section">
          <div class="calendar-day-header">TOMORROW</div>
          <ul class="calendar-events" id="tomorrow-events"></ul>
        </div>
      </div>
    </div>

    <!-- Next Class -->
    <div class="widget class-widget">
      <div class="widget-header">
        <span class="widget-label">LECTURE</span>
        <span class="widget-rule"></span>
      </div>
      <div class="class-countdown" id="class-countdown">
        <div class="class-name" id="class-name">--</div>
        <div class="class-time-remaining" id="class-time-remaining"></div>
        <div class="class-schedule-info" id="class-schedule-info"></div>
      </div>
      <div class="section-rule"></div>
      <div class="class-today-list" id="class-today-list"></div>
    </div>

    <!-- Air Quality -->
    <div class="widget air-widget">
      <div class="widget-header">
        <span class="widget-label">ENVIRONMENT</span>
        <span class="widget-rule"></span>
      </div>
      <div class="air-rows" id="air-rows">
        <div class="air-row">
          <span class="air-metric-label">TEMP</span>
          <span class="air-metric-value" id="air-temp">23.5</span>
          <span class="air-metric-unit">&deg;C</span>
          <div class="air-bar-track"><div class="air-bar-fill" id="air-temp-bar"></div></div>
        </div>
        <div class="air-row">
          <span class="air-metric-label">HUMID</span>
          <span class="air-metric-value" id="air-humidity">45</span>
          <span class="air-metric-unit">%</span>
          <div class="air-bar-track"><div class="air-bar-fill" id="air-humidity-bar"></div></div>
        </div>
        <div class="air-row">
          <span class="air-metric-label">PM2.5</span>
          <span class="air-metric-value" id="air-pm25">12</span>
          <span class="air-metric-unit">ug/m3</span>
          <div class="air-bar-track"><div class="air-bar-fill" id="air-pm25-bar"></div></div>
          <span class="air-status-text" id="air-pm25-status"></span>
        </div>
        <div class="air-row">
          <span class="air-metric-label">PM10</span>
          <span class="air-metric-value" id="air-pm10">25</span>
          <span class="air-metric-unit">ug/m3</span>
          <div class="air-bar-track"><div class="air-bar-fill" id="air-pm10-bar"></div></div>
          <span class="air-status-text" id="air-pm10-status"></span>
        </div>
      </div>
      <div class="widget-footer" id="air-status">LG ThinQ 대기</div>
    </div>

    <!-- YouTube -->
    <div class="widget youtube-widget">
      <div class="widget-header">
        <span class="widget-label">MEDIA</span>
        <span class="widget-rule"></span>
      </div>
      <div class="yt-player-wrap">
        <div class="yt-player-area" id="yt-player-area">
          <iframe id="yt-iframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
          <div class="yt-empty" id="yt-empty">영상을 선택하세요</div>
        </div>
      </div>
      <div class="yt-now-playing" id="yt-now-playing"></div>
      <div class="yt-recommended" id="yt-recommended"></div>
      <div class="yt-controls">
        <button class="yt-btn" id="yt-prev" title="이전">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="yt-btn" id="yt-play" title="재생">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="yt-btn" id="yt-next" title="다음">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <input type="range" class="yt-volume" id="yt-volume" min="0" max="100" value="50" title="볼륨">
      </div>
      <div class="yt-url-area">
        <input type="text" id="yt-url-input" placeholder="YouTube URL" autocomplete="off">
        <button class="yt-btn" id="yt-load">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <ul class="yt-recent" id="yt-recent"></ul>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
